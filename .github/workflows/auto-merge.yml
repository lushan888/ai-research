name: Auto-Merge & Archive

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  archive-on-merge:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Archive Fix
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const fs = require("fs");

            const fixesDir = "fixes";
            if (!fs.existsSync(fixesDir)) fs.mkdirSync(fixesDir);

            const archive = {
              pr: pr.number,
              author: pr.user.login,
              title: pr.title,
              mergedAt: pr.merged_at,
              sha: pr.merge_commit_sha,
              labels: pr.labels.map(l => l.name)
            };

            fs.writeFileSync(
              `fixes/pr-${pr.number}-${pr.merge_commit_sha.slice(0, 8)}.json`,
              JSON.stringify(archive, null, 2)
            );

            // Log to FIXES_LOG.md
            const logEntry = `| #${pr.number} | @${pr.user.login} | ${pr.title.substring(0, 50)} | ${pr.merged_at.slice(0, 10)} |
`;
            fs.appendFileSync("FIXES_LOG.md", logEntry);

            console.log(`Archived PR #${pr.number}: fixes/pr-${pr.number}.json`);

      - name: Commit
        run: |
          git config user.name "AI Training Bot"
          git config user.email "bot@ai-research.github"
          git add fixes/ FIXES_LOG.md 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "archive: PR #${{ github.event.pull_request.number }} merged" && git pull --rebase origin master && git push origin master)
