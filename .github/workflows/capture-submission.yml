name: Capture AI Submission
on:
  issue_comment:
    types: [created]
permissions:
  issues: write
  contents: write
jobs:
  capture:
    if: contains(github.event.issue.labels.*.name, 'honeypot-task')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const c = context.payload.comment.body;
            const m = c.match(/```[\s\S]*?```/);
            if (!m) { core.setFailed('No code block'); return; }
            const sid = 'sub-' + context.issue.number + '-' + Date.now();
            core.setOutput('submission_id', sid);
      - name: Comment
        uses: actions/github-script@v7
        with:
          script: |
            const sid = '${{ steps.extract.outputs.submission_id }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Captured: ' + sid
            });
