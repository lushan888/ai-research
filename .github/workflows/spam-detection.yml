name: Spam Detection

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  detect:
    if: github.event.comment.user.type == 'User'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 30
            });

            const author = context.payload.comment.user.login;
            const body = context.payload.comment.body;
            const commentId = context.payload.comment.id;

            // Find identical comments by the same author
            const identical = comments.filter(
              c => c.user.login === author && c.body === body && c.id !== commentId
            );

            if (identical.length >= 3) {
              console.log(`Spam detected: @${author} posted ${identical.length + 1} identical comments`);

              // Delete ALL identical comments including the current one
              const allSpam = [commentId, ...identical.map(c => c.id)];
              for (const id of allSpam) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: id
                });
                console.log(`Deleted comment ${id}`);
              }

              // Warn the user
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `⚠️ @${author} 您的 ${allSpam.length} 条重复评论已被自动删除（防垃圾保护）。请不要重复提交相同内容。`
              });
            }
